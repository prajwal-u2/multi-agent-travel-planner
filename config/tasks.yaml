tasks:
  - name: analyse_flights
    assigned_agent: flights_agent
    description: >
      Recommend the best flight from the available options, based on the details provided below.

      {flights_data}

      Reasoning for Recommendation:
      - Price: Provide a detailed explanation about why this flight offers the best value compared to others.
      - Duration: Explain why this flight has the best duration in comparison to others.
      - Stops: Discuss why this flight has minimal or optimal stops.
      - Travel Class: Describe why this flight provides the best comfort and amenities.

      Use the provided flight data as the basis for your recommendation. Be sure to justify your
      choice using clear reasoning for each attribute. Do not repeat the flight details in your response.
    expected_output: >
      A structured recommendation that begins with the key details of the recommended flight:
      airline name, flight number, departure time, arrival time, total duration, number of stops,
      travel class, and price. Followed by clear reasoning for the choice based on
      price, duration, stops, and travel class compared to the alternatives.

  - name: analyse_hotels
    assigned_agent: hotels_agent
    description: >
      Based on the hotel data provided below, generate a detailed recommendation for the best hotel.

      {hotels_data}

      Reasoning for Recommendation:
      - Price: The recommended hotel is the best option for the price compared to others, offering
        the best value for the amenities and services provided.
      - Rating: With a higher rating compared to the alternatives, it ensures a better overall guest
        experience. Explain why this makes it the best choice.
      - Location: The hotel is in a prime location, close to important attractions, making it
        convenient for travelers.
      - Amenities: The hotel offers amenities like Wi-Fi, pool, fitness center, free breakfast, etc.
        Discuss how these amenities enhance the experience, making it suitable for different types of travelers.

      Reasoning Requirements:
      - Clearly explain why this hotel is the best option based on price, rating, location, and amenities.
      - Compare it against the other options and explain why this one stands out.
      - Provide concise, well-structured reasoning to make the recommendation clear to the traveler.
      - Your recommendation should help a traveler make an informed decision based on multiple factors, not just one.
      - Do not repeat the raw hotel details in your response.
    expected_output: >
      A structured recommendation that begins with the key details of the recommended hotel:
      hotel name, price per night, overall rating, star class, and top amenities.
      Followed by clear reasoning for the choice based on price, rating, location,
      and amenities compared to the alternatives.

  - name: plan_itineraries
    assigned_agent: itinerary_agent
    description: >
      Create a rich, detailed {days}-day itinerary for the traveler based on the recommendations below.

      Flight Recommendation:
      {flights_text}

      Hotel Recommendation:
      {hotels_text}

      Destination: {destination}
      Travel Dates: {check_in_date} to {check_out_date} ({days} days)

      The document must follow this exact structure:

      # [Trip Title]

      ## Flight Details
      - Airline, flight number, departure airport (code + full name), departure time
      - Arrival airport (code + full name), arrival time
      - Total duration, number of stops, travel class, price

      ## Hotel Details
      - Hotel name, address, price per night, overall rating, star class
      - Top amenities listed
      - One sentence on why this hotel suits the trip

      ## Day-by-Day Itinerary

      For each day use this structure:
      ### Day N: [Day of Week], [Full Date] — [Theme, e.g. "Arrival & First Impressions"]

      **Morning**
      - [Time]: Activity with a 1–2 sentence description of what makes it worth visiting
      - Include transport note: how to get there, which line/route, estimated travel time

      **Afternoon**
      - [Time]: Activity with description
      - Lunch: Name a specific restaurant with a one-line description of what it's known for

      **Evening**
      - [Time]: Activity with description
      - Dinner: Name a specific restaurant with a one-line description
      - Any optional nightlife or wind-down suggestions

      **Transport Tips for the Day**
      - Specific transit lines, ride-share tips, or walking routes relevant to the day's stops

      Rules:
      - Name specific, real restaurants and attractions — never say "a local restaurant" or "a nearby cafe"
      - Include practical details: opening hours where relevant, booking tips, admission costs
      - On arrival day: note flight landing time, transit from airport to hotel (specific route), check-in
      - On departure day: note check-out time, transit to airport, departure time
      - Never say "not provided", "not available", or reference this prompt
      - If a detail is unknown, make a confident realistic assumption

    expected_output: >
      A rich, detailed travel document in markdown. Sections: Flight Details, Hotel Details,
      and a day-by-day itinerary with Morning/Afternoon/Evening structure for all {days} days.
      Every day names specific restaurants and attractions with descriptions, timings, and
      transport details. Reads as a polished, professional travel guide.

  - name: allocate_days
    assigned_agent: allocation_agent
    description: >
      A traveller wants to visit the following cities, with {total_days} total days available:
      {cities_list}

      Your job is to:
      1. Decide the best order to visit these cities — group geographically close cities
         together to avoid unnecessary backtracking and long mid-trip hops.
      2. Decide how many days to spend in each city based on:
         - The number and variety of major attractions
         - How much time a typical tourist needs to experience each city well
         - Travel days: the first city loses a morning (arrival flight) and the last
           city loses an afternoon (departure flight)

      Constraints:
      - Every city must appear exactly once
      - Every city must get at least 1 day
      - The day counts must sum to exactly {total_days}
    expected_output: >
      A JSON array only — no explanation, no prose. Each element has "city" and "days".
      The array order is the recommended visit order. Example for 3 cities over 12 days:
      [{{"city": "Paris", "days": 5}}, {{"city": "Rome", "days": 4}}, {{"city": "Barcelona", "days": 3}}]

  - name: analyse_multi_city_flights
    assigned_agent: flights_agent
    description: >
      Recommend the best multi-city flight itinerary from the options below.
      Each option contains multiple legs covering all cities in order.

      {flights_data}

      Evaluate each option as a whole:
      - Total Price: Which option offers the best overall value?
      - Total Duration: Which option minimises total travel time across all legs?
      - Stops: Which option has the fewest layovers across all legs?
      - Travel Class: Which option provides the best comfort?
    expected_output: >
      A structured recommendation listing each leg (airline, departure, arrival, duration)
      of the chosen option, the total price, and clear reasoning for the choice
      compared to the alternatives.

  - name: analyse_hotels_for_city
    assigned_agent: hotels_agent
    description: >
      Based on the hotel data below for {city}, recommend the best hotel for a stay
      from {arrival_date} to {departure_date}.

      {hotels_data}

      Evaluate on: Price, Rating, Location, Amenities.
    expected_output: >
      Hotel recommendation for {city}: hotel name, price/night, rating, class,
      top amenities, and reasoning compared to alternatives.

  - name: plan_multi_city_itinerary
    assigned_agent: itinerary_agent
    description: >
      Create a rich, detailed multi-city itinerary for {total_days} days across:
      {city_schedule}

      Flight Recommendations (per leg):
      {flights_text}

      Hotel Recommendations (per city):
      {hotels_text}

      The document must follow this exact structure:

      # [Trip Title]

      ## Flight Details
      For each leg list: airline, departure airport (code + full name), departure time,
      arrival airport (code + full name), arrival time, duration, stops, travel class, price.
      If a leg's exact time is not in the data, estimate realistically based on typical
      flight times for that route — state it confidently without caveats.

      ## Hotel Details
      For each city:
      ### [City Name]
      - Hotel name, address, price per night, rating, star class, top amenities
      - One sentence on why it suits this leg of the trip

      ## Day-by-Day Itinerary

      Group days by city. For each city use:
      ## [City Name] ([arrival_date] – [departure_date])

      For each day:
      ### Day N: [Day of Week], [Full Date] — [Theme]

      **Morning**
      - [Time]: Activity — 1–2 sentence description of what makes it worth visiting
      - Transport: how to get there, which line/route, estimated travel time

      **Afternoon**
      - [Time]: Activity with description
      - Lunch: Specific restaurant name — one-line description of what it is known for

      **Evening**
      - [Time]: Activity with description
      - Dinner: Specific restaurant name — one-line description
      - Optional nightlife or wind-down suggestion

      **Transport Tips for the Day**
      - Specific transit lines, ride-share tips, or walking routes for the day's stops

      On city-transition days include:
      - Morning activities before departure
      - Exact or estimated departure time and flight details to next city
      - Arrival time in next city and transit from airport to hotel

      Rules:
      - Name specific, real restaurants and attractions — never say "a local restaurant" or "a nearby cafe"
      - Include practical details: opening hours, booking tips, admission costs where relevant
      - Never say "not provided", "not available", or reference this prompt
      - If a detail is unknown, make a confident realistic assumption

    expected_output: >
      A rich, detailed multi-city travel document in markdown. Sections: Flight Details,
      Hotel Details per city, and a day-by-day itinerary grouped by city with
      Morning/Afternoon/Evening structure for all {total_days} days. Every day names
      specific restaurants and attractions with descriptions, timings, and transport details.
      City-transition days clearly show the connecting flight and arrival logistics.
      Reads as a polished, professional travel guide.